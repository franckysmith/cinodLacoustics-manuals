<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cinod — Fiche technique</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0c0c1d; color: #f0ece4;
  padding: 16px; min-height: 100vh;
}
.header { text-align: center; padding: 20px 0 12px; }
.logo { font-size: 1.1rem; font-weight: 700; color: #c8960a; letter-spacing: 2px; }
.role-badge {
  display: inline-block; margin-top: 6px; padding: 4px 14px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
}
.role-R { background: #1565c020; color: #42a5f5; border: 1px solid #1565c040; }
.role-G { background: #c6282820; color: #ef5350; border: 1px solid #c6282840; }
.venue-name { font-size: 1.8rem; font-weight: 800; margin: 16px 0 4px; color: #fff; }
.venue-date { font-size: 0.85rem; color: #7a7a98; }

.card {
  background: #111128; border: 1px solid #252542; border-radius: 12px;
  padding: 14px 16px; margin: 12px 0;
}
.src-header { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.src-name { font-size: 1.2rem; font-weight: 700; }
.src-point { font-size: 0.85rem; font-weight: 700; color: #c8960a; }
.src-stereo { font-size: 0.75rem; color: #585878; }
.src-info { font-size: 0.85rem; color: #9898b8; font-family: monospace; margin-top: 6px; }
.src-info span { margin-right: 8px; }
.wt { font-weight: 700; color: #ef5350; }
.ht { color: #42a5f5; }
.src-comment { margin-top: 6px; font-size: 0.8rem; font-style: italic; color: #d4a044; }

/* Toggle button */
.toggle-btn {
  display: block; margin: 16px auto; padding: 10px 20px; border-radius: 10px;
  border: 1px solid #c8960a40; background: #c8960a18; color: #c8960a;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit;
}
.toggle-btn:active { background: #c8960a30; }

/* SVG drawings */
.drawing { margin-top: 10px; overflow-x: auto; }
.drawing svg { display: block; margin: 0 auto; }

.print-btn {
  display: block; margin: 20px auto; padding: 12px 24px; border-radius: 10px;
  border: 1px solid #c8960a40; background: #c8960a18; color: #c8960a;
  font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit;
}
.footer { text-align: center; padding: 24px 0; color: #404060; font-size: 0.75rem; }
.footer a { color: #c8960a; text-decoration: none; }
.error { text-align: center; padding: 40px 20px; color: #ef5350; }

@media print {
  body { background: #fff; color: #000; padding: 10px; }
  .print-btn, .toggle-btn { display: none !important; }
  .card { background: #f8f8f8; border-color: #ddd; }
  .src-name { color: #000; } .src-info { color: #444; }
  .wt { color: #c62828; } .ht { color: #1565c0; }
  .src-point { color: #8a6500; } .src-stereo { color: #888; }
  .venue-name { color: #000; } .venue-date { color: #666; }
  .logo { color: #8a6500; }
  .role-R { color: #1565c0; } .role-G { color: #c62828; }
  .footer { display: none; }
  .cab-box { stroke: #333 !important; fill: #f0f0f0 !important; }
  .cab-front { stroke: #000 !important; }
  .cab-num { fill: #000 !important; }
  .angle-text { fill: #c62828 !important; }
  .cable-arc { stroke: #8a6500 !important; }
}
</style>
</head>
<body>
<div id="app"><div class="error" id="err" style="display:none">Lien invalide. Scannez le QR code.</div></div>
<script>
(function() {
  var hash = location.hash.substring(1);
  if (!hash) { document.getElementById('err').style.display = 'block'; return; }
  var raw;
  try {
    // Try base64 first, then fallback to URI-encoded JSON
    raw = decodeURIComponent(escape(atob(hash)));
  } catch(e) {
    try { raw = decodeURIComponent(hash); } catch(e2) { raw = hash; }
  }
  var d;
  try { d = JSON.parse(raw); } catch(e) {
    document.getElementById('err').style.display = 'block'; return;
  }

  var roleName = d.r === 'R' ? 'Road' : 'Rigger';
  var h = '<div class="header"><div class="logo">CINOD</div>';
  h += '<div class="role-badge role-' + d.r + '">' + roleName + '</div>';
  h += '<div class="venue-name">' + esc(d.v) + '</div>';
  if (d.d) h += '<div class="venue-date">' + esc(d.d) + '</div>';
  h += '</div>';

  for (var i = 0; i < d.s.length; i++) {
    var s = d.s[i];
    h += '<div class="card">';
    h += '<div class="src-header">';
    h += '<span class="src-name">' + esc(s.n) + '</span>';
    if (s.l) h += '<span class="src-point">' + esc(s.l) + '</span>';
    if (s.jc) h += '<span class="src-stereo">Jardin / Cour</span>';
    h += '</div>';

    // Info line
    var info = s.c + ' ' + esc(s.t);
    if (s.w) info += ' <span class="wt">' + s.w + 'kg</span>';
    if (s.z !== undefined) info += ' <span class="ht">h=' + s.z + 'm</span>';
    if (s.m) info += ' <span>' + s.m + ' mot.</span>';
    h += '<div class="src-info">' + info + '</div>';

    // Rigger extras
    if (d.r === 'G') {
      if (s.ml) h += '<div class="src-info">Charge moteur: <span class="wt">' + s.ml + 'kg</span></div>';
      if (s.b) h += '<div class="src-info">Bumper: ' + esc(s.b) + '</div>';
      if (s.x !== undefined) h += '<div class="src-info">Position: X:' + s.x + ' Y:' + s.y + '</div>';
    }

    if (s.cm) h += '<div class="src-comment">' + esc(s.cm) + '</div>';

    // Drawing placeholder
    h += '<div class="drawing" id="draw-' + i + '"></div>';
    h += '</div>';
  }

  h += '<button class="toggle-btn" id="toggleDraw">Voir les sch\u00e9mas</button>';
  h += '<button class="print-btn" onclick="window.print()">Imprimer</button>';
  h += '<div class="footer">G\u00e9n\u00e9r\u00e9 par <a href="#">Cinod for L-Acoustics</a></div>';

  document.getElementById('app').innerHTML = h;
  document.title = 'Cinod \u2014 ' + d.v + ' (' + roleName + ')';

  // Toggle drawings
  var drawVisible = false;
  document.getElementById('toggleDraw').onclick = function() {
    drawVisible = !drawVisible;
    this.textContent = drawVisible ? 'Masquer les sch\u00e9mas' : 'Voir les sch\u00e9mas';
    for (var i = 0; i < d.s.length; i++) {
      var el = document.getElementById('draw-' + i);
      if (drawVisible) {
        el.innerHTML = buildDrawing(d.s[i], d.r);
      } else {
        el.innerHTML = '';
      }
    }
  };

  function esc(str) {
    var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML;
  }

  // === SVG Drawing Builder ===
  function buildDrawing(src, role) {
    if (!src.a || !src.a.length) {
      if (!src.g || !src.g.length) return '';
    }

    var count = src.c || 0;
    if (count === 0) return '';

    var cabW = 70, cabH = 36, gap = 14;
    var leftM = 50;
    var totalH = count * (cabH + gap) + 40;
    var svgW = leftM + cabW + 40;

    var svg = '<svg width="' + svgW + '" height="' + totalH + '" xmlns="http://www.w3.org/2000/svg">';

    // Cable arcs first (behind)
    if (src.g) {
      for (var ci = 0; ci < count - 1; ci++) {
        if (src.g[ci] !== undefined && src.g[ci] >= 0 &&
            src.g[ci + 1] !== undefined && src.g[ci + 1] >= 0 &&
            src.g[ci] === src.g[ci + 1]) {
          var y1 = 20 + ci * (cabH + gap) + cabH;
          var y2 = 20 + (ci + 1) * (cabH + gap);
          var cy = (y1 + y2) / 2;
          var r = 22;
          var half = 65 * Math.PI / 180;
          var ax1 = leftM + r * Math.cos(Math.PI - half);
          var ay1 = cy + r * Math.sin(Math.PI - half);
          var ax2 = leftM + r * Math.cos(Math.PI + half);
          var ay2 = cy + r * Math.sin(Math.PI + half);
          svg += '<path d="M ' + ax1 + ' ' + ay1 + ' A ' + r + ' ' + r + ' 0 0 1 ' + ax2 + ' ' + ay2 + '" fill="none" class="cable-arc" stroke="#c8960a" stroke-width="3" stroke-linecap="round"/>';
        }
      }
    }

    // Cabinets
    for (var i = 0; i < count; i++) {
      var y = 20 + i * (cabH + gap);

      // Angle between this and previous
      if (i > 0 && src.a && src.a[i] !== null && src.a[i] !== undefined) {
        var ay = y - gap / 2 + 5;
        svg += '<text x="' + (leftM - 8) + '" y="' + ay + '" text-anchor="end" class="angle-text" fill="#ff8a65" font-size="13" font-weight="700" font-family="Arial">' + src.a[i] + '\u00B0</text>';
      }

      // Cabinet body
      svg += '<rect x="' + leftM + '" y="' + y + '" width="' + cabW + '" height="' + cabH + '" rx="3" class="cab-box" fill="#1a1a34" stroke="#3a3a5a" stroke-width="1.5"/>';

      // Front face (right side)
      svg += '<line x1="' + (leftM + cabW) + '" y1="' + y + '" x2="' + (leftM + cabW) + '" y2="' + (y + cabH) + '" class="cab-front" stroke="#6a6a8a" stroke-width="2.5" stroke-linecap="round"/>';

      // Cabinet number
      svg += '<text x="' + (leftM + cabW / 2) + '" y="' + (y + cabH / 2 + 6) + '" text-anchor="middle" class="cab-num" fill="#9898b8" font-size="14" font-weight="800" font-family="monospace">' + (i + 1) + '</text>';
    }

    svg += '</svg>';
    return svg;
  }
})();
</script>
</body>
</html>
